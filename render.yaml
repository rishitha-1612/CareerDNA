services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: resume-analyser-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: 8000
    healthCheckPath: /health

  # ── Frontend (React + Vite) ──────────────────────────────────────────────────
  - type: web
    name: resume-analyser-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # set this manually in Render dashboard to your backend URL
